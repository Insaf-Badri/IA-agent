services:

  postgres:
    image: postgres:15
    container_name: loan_postgres
    restart: always
    environment:
      POSTGRES_DB: loan_review
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: insaf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - loan_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d loan_review"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: loan_redis
    restart: always
    networks:
      - loan_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  minio:
    image: minio/minio
    container_name: loanminio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: insaf
      MINIO_ROOT_PASSWORD: insaf123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    networks:
      - loan_network
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgadmin:
    image: dpage/pgadmin4
    container_name: loan_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - loan_network
    depends_on:
      postgres:
        condition: service_healthy

  langgraph:
    image: loan-langgraph:latest
    container_name: loan_langgraph
    restart: always
    env_file: .env
    environment:
      REDIS_URI: redis://loan_redis:6379
      DATABASE_URI: postgres://admin:insaf@loan_postgres:5432/loan_review
      MINIO_ENDPOINT: loanminio:9000
      MINIO_ACCESS_KEY: insaf          # ← fixed
      MINIO_SECRET_KEY: insaf123       # ← fixed
    ports:
      - "2024:8000"
    networks:
      - loan_network
    volumes:
      - ./ML/models:/deps/outer-IA_Agent_pfe/src/ML/models:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  api:
    build: .
    container_name: loan_api
    restart: always
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      REDIS_URL: redis://loan_redis:6379/0
      DATABASE_URL: postgresql://admin:insaf@loan_postgres:5432/loan_review
      MINIO_ENDPOINT: loanminio:9000
      MINIO_ACCESS_KEY: insaf          # ← fixed
      MINIO_SECRET_KEY: insaf123       # ← fixed
      LANGGRAPH_SERVER_URL: http://loan_langgraph:8000
    ports:
      - "8000:8000"
    networks:
      - loan_network
    volumes:
      - .:/app
      - ./case-documents:/app/case-documents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      langgraph:
        condition: service_started

  worker:
    build: .
    container_name: loan_worker
    restart: always
    command: celery -A Backend.tasks.celery_app worker --loglevel=info
    env_file: .env
    environment:
      REDIS_URL: redis://loan_redis:6379/0
      DATABASE_URL: postgresql://admin:insaf@loan_postgres:5432/loan_review
      MINIO_ENDPOINT: loanminio:9000
      MINIO_ACCESS_KEY: insaf          # ← fixed
      MINIO_SECRET_KEY: insaf123       # ← fixed
      LANGGRAPH_SERVER_URL: http://loan_langgraph:8000
    networks:
      - loan_network
    volumes:
      - .:/app
      - ./case-documents:/app/case-documents
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      langgraph:
        condition: service_started

volumes:
  pgdata:
  miniodata:

networks:
  loan_network:
    driver: bridge